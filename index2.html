<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <title>Nova Strike</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0b0b1e;
            text-align: center;
            font-family: Lato, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        img {
            border: 5px solid #555;
        }

        canvas {
            background-color: #111;
            background-image: url("./assets/vignesh-krishnan-space-bg-1423311712.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            border: 4px solid azure;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        h1 {
            color: azure;
            margin-bottom: 10px;
        }

        span {
            font-style: italic;
        }

        #score-board,
        #effect-board {
            color: azure;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 4rem;
            color: #fff;
            text-shadow: 0 0 5px #ff005e, 0 0 10px #ff005e, 0 0 20px #ff005e, 0 0 40px #ff005e, 0 0 80px #ff005e;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            0% {
                text-shadow: 0 0 5px #ff005e, 0 0 10px #ff005e, 0 0 20px #ff005e, 0 0 40px #ff005e, 0 0 80px #ff005e;
            }

            100% {
                text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #00d4ff, 0 0 80px #00d4ff, 0 0 160px #00d4ff;
            }
        }
    </style>
</head>

<body>
    <header>
    </header>
    <main class="container-fluid py-4">
        <div id="mouseTarget" class="game-wrapper text-center text-white">

            <h1 class="game-title mb-4">Nova Strike</h1>

            <div class="row align-items-center justify-content-center g-3">

                <div class="col-md-3">
                    <div id="score-board" class="stat-card unique-score">
                        <span class="stat-label">SCORE</span><br>
                        <span id="points" class="stat-value">0</span>
                    </div>
                </div>

                <div class="col-md-6 d-flex justify-content-center">
                    <div class="canvas-container">
                        <canvas id="main" width="500" height="800"></canvas>
                    </div>
                </div>

                <div class="col-md-3">
                    <div id="effect-board" class="stat-card unique-accuracy">
                        <span class="stat-label">ACTIVE EFFECT</span><br>
                        <span id="current-effect" class="stat-value">Aucun</span>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        //ANCHOR - Variables
        const mouseTarget = document.getElementById("mouseTarget");
        var canvas = document.querySelector("canvas");
        var drawingSurface = canvas.getContext("2d");

        var rocketImage = new Image(); rocketImage.src = "./assets/rocket.png";
        rocketImage.style.borderImage = "url('./assets/rocket.png') 30 30 round";
        var bulletImage = new Image(); bulletImage.src = "./assets/bullet.png";
        var alienImage = new Image(); alienImage.src = "./assets/alien.png";
        var explosionImage = new Image(); explosionImage.src = "./assets/explosion.gif";

        var meteorImages = [new Image(), new Image(), new Image(), new Image()];
        meteorImages[0].src = "./assets/meteor.png";
        meteorImages[0].rectCollide = { x: 0, y: 30, width: 50 };
        meteorImages[1].src = "./assets/meteor2.png";
        meteorImages[2].src = "./assets/meteor3.png";
        meteorImages[3].src = "./assets/meteor4.png";

        var triplePowerUp = new Image(); triplePowerUp.src = "./assets/missile-pod.png";
        var shieldPowerUp = new Image(); shieldPowerUp.src = "./assets/shield.png";
        var laserPowerUp = new Image(); laserPowerUp.src = "./assets/sinusoidal-beam.png";

        var powerUp = null;
        var powerUpTimer = 0;
        var powerUpImages = {
            triple: triplePowerUp,
            shield: shieldPowerUp,
            laser: laserPowerUp
        };

        var powerupMessage = null;

        rocketImage.onload = init;
        if (rocketImage.complete) init();

        var gameState = "start";
        var score = 0;
        var scoreDisplay = document.getElementById("points");

        // Cibler l'élément HTML de l'effet de droite
        var effectDisplay = document.getElementById("current-effect");

        var rocket = { x: 200, y: 650, width: 80, height: 80, speedX: 0, speedY: 0 };
        var bullets = [];
        var aliens = [];
        var meteor = [];
        var explosions = [];
        var powerups = [];
        var moveLeft = false, moveRight = false, moveUp = false, moveDown = false;

        var startBtn = { x: canvas.width / 2 - 100, y: canvas.height / 2 - 10, width: 200, height: 75 };
        var pauseBtn = { x: canvas.width - 55, y: 10, width: 45, height: 45 };

        var alienInterval, meteorInterval;

        function updateEffectDisplay() {
            if (powerUp === "triple") {
                effectDisplay.innerHTML = "Triple Shot";
            } else if (powerUp === "laser") {
                effectDisplay.innerHTML = "Laser";
            } else if (powerUp === "shield") {
                effectDisplay.innerHTML = "Bouclier";
            } else {
                effectDisplay.innerHTML = "Aucun";
            }
        }

        function startGame() { //ANCHOR - Start 
            score = 0;
            powerUp = null;
            powerUpTimer = 0;
            scoreDisplay.innerHTML = score;
            updateEffectDisplay();
            bullets = [];
            aliens = [];
            meteor = [];
            explosions = [];
            powerups = [];
            rocket.x = 200;
            rocket.y = 650;
            powerupMessage = null;

            gameState = "playing";

            clearInterval(alienInterval);
            clearInterval(meteorInterval);

            alienInterval = setInterval(spawnRock, 1500);
            meteorInterval = setInterval(spawnMeteor, 2000);
        }

        canvas.addEventListener("click", function (e) { //ANCHOR - Btn EventListener
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;

            if (gameState === "start" || gameState === "lose") {
                if (x >= startBtn.x && x <= startBtn.x + startBtn.width &&
                    y >= startBtn.y && y <= startBtn.y + startBtn.height) {
                    startGame();
                }
            }

            if (gameState === "playing" || gameState === "paused") {
                if (x >= pauseBtn.x && x <= pauseBtn.x + pauseBtn.width &&
                    y >= pauseBtn.y && y <= pauseBtn.y + pauseBtn.height) {
                    gameState = gameState === "playing" ? "paused" : "playing";
                }
            }
        });

        window.addEventListener("keydown", function (e) {
            if (e.code === "KeyP") {
                if (gameState === "playing") gameState = "paused";
                else if (gameState === "paused") gameState = "playing";
                return;
            }

            if (gameState !== "playing") return;

            switch (e.code) {
                case "KeyW": case "ArrowUp": moveUp = true; break;
                case "KeyS": case "ArrowDown": moveDown = true; break;
                case "KeyA": case "ArrowLeft": moveLeft = true; break;
                case "KeyD": case "ArrowRight": moveRight = true; break;
                case "Space":
                    e.preventDefault();
                    shootBullet();
                    break;
            }
        }, false);

        window.addEventListener("keyup", function (e) {
            switch (e.code) {
                case "KeyW": case "ArrowUp": moveUp = false; break;
                case "KeyS": case "ArrowDown": moveDown = false; break;
                case "KeyA": case "ArrowLeft": moveLeft = false; break;
                case "KeyD": case "ArrowRight": moveRight = false; break;
            }
        }, false);

        var initDone = false;
        function init() {
            if (initDone) return;
            initDone = true;
            update();
        }

        function shootBullet() {   //ANCHOR - shootBullet
            switch (powerUp) {
                case "triple":
                    bullets.push({ x: rocket.x + rocket.width / 2 - 10, y: rocket.y, width: 20, height: 20, speed: 7, speedX: 0 });
                    bullets.push({ x: rocket.x + rocket.width / 2 - 10, y: rocket.y, width: 20, height: 20, speed: 7, speedX: -2 });
                    bullets.push({ x: rocket.x + rocket.width / 2 - 10, y: rocket.y, width: 20, height: 20, speed: 7, speedX: 2 });
                    break;
                case "laser":
                    bullets.push({ x: rocket.x + rocket.width / 2 - 10, y: rocket.y, width: 40, height: 40, speed: 14, speedX: 0 });
                    break;
                default:
                    bullets.push({ x: rocket.x + rocket.width / 2 - 10, y: rocket.y, width: 20, height: 20, speed: 7, speedX: 0 });
                    break;
            }
        }

        function spawnRock() {  //ANCHOR - spawnRock
            if (gameState !== "playing") return;
            var randomX = Math.floor(Math.random() * (canvas.width - 50));
            aliens.push({ x: randomX, y: -50, width: 50, height: 50, speed: 3 + score / 10 });
        }

        function spawnMeteor() {    //ANCHOR - spawnMeteor
            if (gameState !== "playing") return;
            var randomX = Math.floor(Math.random() * (canvas.width - 50));
            var imgIndex = Math.floor(Math.random() * 4);
            meteor.push({
                x: randomX, y: -50, width: 50, height: 50,
                speed: 3 + score / 10, imgIndex: imgIndex, life: Math.floor(Math.random() * (8 - 4 + 1)) + 4,
            });
        }

        function spawnPowerUp(x, y) {
            var types = ["triple", "shield", "laser"];
            var type = types[Math.floor(Math.random() * types.length)];
            powerups.push({
                x: x, y: y, width: 40, height: 40, speed: 2, type: type
            });
        }

        function collectPowerUp(type) {
            var labels = {
                triple: "Triple Shot !",
                shield: "Bouclier !",
                laser: "Laser !"
            };

            switch (type) {
                case "triple":
                    powerUp = "triple";
                    powerUpTimer = 600;
                    break;
                case "laser":
                    powerUp = "laser";
                    powerUpTimer = 600;
                    break; // Correction : Ajout du break manquant
                case "shield":
                    powerUp = "shield";
                    powerUpTimer = 600; // Optionnel : donner un timer au bouclier si nécessaire
                    break; // Correction : Ajout du break manquant
                default:
                    break;
            }
            powerupMessage = { text: labels[type], timer: 60 };
            updateEffectDisplay(); // Met à jour l'affichage de droite immédiatement
        }

        function update() { //ANCHOR - Update
            window.requestAnimationFrame(update);

            if (gameState === "start") { renderStartScreen(); return; }
            if (gameState === "paused") { renderPauseScreen(); return; }
            if (gameState === "lose") { renderLoseScreen(); return; }

            if (moveUp && !moveDown) rocket.speedY = -5;
            else if (moveDown && !moveUp) rocket.speedY = 5;
            else rocket.speedY = 0;
            if (moveLeft && !moveRight) rocket.speedX = -5;
            else if (moveRight && !moveLeft) rocket.speedX = 5;
            else rocket.speedX = 0;

            rocket.x += rocket.speedX;
            rocket.y += rocket.speedY;
            if (rocket.x < 0) rocket.x = 0;
            if (rocket.y < 0) rocket.y = 0;
            if (rocket.x + rocket.width > canvas.width) rocket.x = canvas.width - rocket.width;
            if (rocket.y + rocket.height > canvas.height) rocket.y = canvas.height - rocket.height;

            for (var i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                bullets[i].x += bullets[i].speedX || 0;
                if (bullets[i].y < -20 || bullets[i].x < -20 || bullets[i].x > canvas.width + 20) {
                    bullets.splice(i, 1);
                }
            }

            for (var j = aliens.length - 1; j >= 0; j--) {
                aliens[j].y += aliens[j].speed;
                if (aliens[j].y + aliens[j].height >= canvas.height) {
                    gameState = "lose";
                    return;
                }
            }

            for (var m = meteor.length - 1; m >= 0; m--) {
                meteor[m].y += meteor[m].speed;
                if (meteor[m].y > canvas.height) meteor.splice(m, 1);
            }

            for (var p = powerups.length - 1; p >= 0; p--) {
                powerups[p].y += powerups[p].speed;
                if (powerups[p].y > canvas.height) powerups.splice(p, 1);
            }

            for (var e = explosions.length - 1; e >= 0; e--) {
                explosions[e].timer--;
                if (explosions[e].timer <= 0) explosions.splice(e, 1);
            }

            if (powerupMessage) {
                powerupMessage.timer--;
                if (powerupMessage.timer <= 0) powerupMessage = null;
            }

            if (powerUp) {
                powerUpTimer--;
                if (powerUpTimer <= 0) {
                    powerUp = null;
                    updateEffectDisplay(); // Met à jour l'affichage quand le bonus expire
                }
            }

            for (var b = bullets.length - 1; b >= 0; b--) {
                for (var a = aliens.length - 1; a >= 0; a--) {
                    if (bullets[b] && aliens[a] &&
                        bullets[b].x < aliens[a].x + aliens[a].width &&
                        bullets[b].x + bullets[b].width > aliens[a].x &&
                        bullets[b].y < aliens[a].y + aliens[a].height &&
                        bullets[b].y + bullets[b].height > aliens[a].y) {

                        explosions.push({ x: aliens[a].x, y: aliens[a].y, width: aliens[a].width, height: aliens[a].height, timer: 20 });
                        bullets.splice(b, 1);
                        aliens.splice(a, 1);
                        score++;
                        scoreDisplay.innerHTML = score;
                        break;
                    }
                }

                if (bullets[b]) {
                    for (var mt = meteor.length - 1; mt >= 0; mt--) {
                        if (bullets[b] && meteor[mt] &&
                            bullets[b].x < meteor[mt].x + meteor[mt].width &&
                            bullets[b].x + bullets[b].width > meteor[mt].x &&
                            bullets[b].y < meteor[mt].y + meteor[mt].height &&
                            bullets[b].y + bullets[b].height > meteor[mt].y) {

                            bullets.splice(b, 1);
                            meteor[mt].life--;

                            if (meteor[mt].life <= 0) {
                                explosions.push({ x: meteor[mt].x, y: meteor[mt].y, width: meteor[mt].width, height: meteor[mt].height, timer: 20 });
                                if (Math.random() < 0.6) {
                                    spawnPowerUp(meteor[mt].x + meteor[mt].width / 2 - 20, meteor[mt].y);
                                }
                                meteor.splice(mt, 1);
                                score++;
                                scoreDisplay.innerHTML = score;
                            }
                            break;
                        }
                    }
                }
            }

            for (var p = powerups.length - 1; p >= 0; p--) {
                if (rocket.x < powerups[p].x + powerups[p].width &&
                    rocket.x + rocket.width > powerups[p].x &&
                    rocket.y < powerups[p].y + powerups[p].height &&
                    rocket.y + rocket.height > powerups[p].y) {

                    collectPowerUp(powerups[p].type);
                    powerups.splice(p, 1);
                }
            }

            for (var a = aliens.length - 1; a >= 0; a--) { //ANCHOR - Alien
                if (rocket.x < aliens[a].x + aliens[a].width &&
                    rocket.x + rocket.width > aliens[a].x &&
                    rocket.y < aliens[a].y + aliens[a].height &&
                    rocket.y + rocket.height > aliens[a].y) {

                    explosions.push({ x: rocket.x, y: rocket.y, width: rocket.width, height: rocket.height, timer: 20 });
                    gameState = "lose";
                    return;
                }
            }

            for (var m = meteor.length - 1; m >= 0; m--) { //ANCHOR - Meteor
                if (rocket.x < meteor[m].x + meteor[m].width &&
                    rocket.x + rocket.width > meteor[m].x &&
                    rocket.y < meteor[m].y + meteor[m].height &&
                    rocket.y + rocket.height > meteor[m].y) {

                    explosions.push({ x: rocket.x, y: rocket.y, width: rocket.width, height: rocket.height, timer: 20 });
                    gameState = "lose";
                    return;
                }
            }

            render();
        }

        function render() { //ANCHOR - Render
            drawingSurface.clearRect(0, 0, canvas.width, canvas.height);
            drawingSurface.textAlign = "center";

            drawingSurface.drawImage(rocketImage, rocket.x, rocket.y, rocket.width, rocket.height);

            for (var i = 0; i < bullets.length; i++) {
                if (bulletImage.complete && bulletImage.naturalWidth !== 0) {
                    drawingSurface.drawImage(bulletImage, bullets[i].x, bullets[i].y, bullets[i].width, bullets[i].height);
                } else {
                    drawingSurface.fillStyle = "yellow";
                    drawingSurface.fillRect(bullets[i].x, bullets[i].y, bullets[i].width, bullets[i].height);
                }
            }

            for (var e = 0; e < explosions.length; e++) {
                if (explosionImage.complete && explosionImage.naturalWidth !== 0) {
                    drawingSurface.drawImage(explosionImage, explosions[e].x, explosions[e].y, explosions[e].width, explosions[e].height);
                } else {
                    drawingSurface.fillStyle = "orange";
                    drawingSurface.fillRect(explosions[e].x, explosions[e].y, explosions[e].width, explosions[e].height);
                }
            }
            mouseTarget.addEventListener("mouseleave", (e) => {
                if (gameState === "playing") {
                    gameState = "paused"
                }
            });

            for (var p = 0; p < powerups.length; p++) {
                var pu = powerups[p];
                var puImg = powerUpImages[pu.type];

                if (puImg && puImg.complete && puImg.naturalWidth !== 0) {
                    drawingSurface.drawImage(puImg, pu.x, pu.y, pu.width, pu.height);
                } else {
                    drawingSurface.fillStyle = "gold";
                    drawingSurface.fillRect(pu.x, pu.y, pu.width, pu.height);
                }
            }

            for (var j = 0; j < aliens.length; j++) {
                if (alienImage.complete && alienImage.naturalWidth !== 0) {
                    drawingSurface.drawImage(alienImage, aliens[j].x, aliens[j].y, aliens[j].width, aliens[j].height);
                } else {
                    drawingSurface.fillStyle = "red";
                    drawingSurface.fillRect(aliens[j].x, aliens[j].y, aliens[j].width, aliens[j].height);
                }
            }

            for (var j = 0; j < meteor.length; j++) {
                var img = meteorImages[meteor[j].imgIndex];
                if (img && img.complete && img.naturalWidth !== 0) {
                    drawingSurface.drawImage(img, meteor[j].x, meteor[j].y, meteor[j].width, meteor[j].height);
                } else {
                    drawingSurface.fillStyle = "gray";
                    drawingSurface.fillRect(meteor[j].x, meteor[j].y, meteor[j].width, meteor[j].height);
                }
            }

            if (powerupMessage) {
                drawingSurface.save();
                drawingSurface.font = "bold 24px Arial";
                drawingSurface.fillStyle = "#ffffff";
                drawingSurface.fillText(powerupMessage.text, canvas.width / 2, canvas.height / 2);
                drawingSurface.restore();
            }

            drawingSurface.fillStyle = "rgba(0,0,0,0.5)";
            drawingSurface.beginPath();
            drawingSurface.roundRect(pauseBtn.x, pauseBtn.y, pauseBtn.width, pauseBtn.height, 8);
            drawingSurface.fill();
            drawingSurface.font = "28px Arial";
            drawingSurface.fillStyle = "white";
            if (gameState !== "paused") {
                drawingSurface.fillText("⏸", pauseBtn.x + pauseBtn.width / 2, pauseBtn.y + 33);
            }
        }

        function renderStartScreen() {  //ANCHOR - StartScreen
            drawingSurface.clearRect(0, 0, canvas.width, canvas.height);
            drawingSurface.textAlign = "center";
            drawingSurface.fillStyle = "azure";
            drawingSurface.font = "bold 36px Arial";
            drawingSurface.fillText("Space Shooter", canvas.width / 2, canvas.height / 2 - 80);
            drawingSurface.font = "18px Arial";
            drawingSurface.fillStyle = "#aaccff";
            drawingSurface.fillText("Flèches pour bouger, Espace pour tirer", canvas.width / 2, canvas.height / 2 - 40);
            drawingSurface.fillStyle = "white";
            drawingSurface.fillRect(startBtn.x, startBtn.y, startBtn.width, startBtn.height);
            drawingSurface.fillStyle = "#001122";
            drawingSurface.font = "bold 22px Arial";
            drawingSurface.fillText("Start Game", canvas.width / 2, startBtn.y + 46);
        }

        function renderLoseScreen() {   //ANCHOR - LoseScreen
            drawingSurface.clearRect(0, 0, canvas.width, canvas.height);
            drawingSurface.textAlign = "center";
            drawingSurface.fillStyle = "crimson";
            drawingSurface.font = "bold 42px Arial";
            drawingSurface.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 80);
            drawingSurface.font = "20px Arial";
            drawingSurface.fillStyle = "#aaccff";
            drawingSurface.fillText(`Score : ${score}`, canvas.width / 2, canvas.height / 2 - 30);

            drawingSurface.fillStyle = "white";
            drawingSurface.fillRect(startBtn.x, startBtn.y, startBtn.width, startBtn.height);
            drawingSurface.fillStyle = "#001122";
            drawingSurface.font = "bold 22px Arial";
            drawingSurface.fillText("Rejouer", canvas.width / 2, startBtn.y + 46);
        }

        function renderPauseScreen() {  //ANCHOR - PauseScreen
            render();
            drawingSurface.fillStyle = "rgba(0, 0, 0, 0.55)";
            drawingSurface.fillRect(0, 0, canvas.width, canvas.height);
            drawingSurface.textAlign = "center";
            drawingSurface.fillStyle = "azure";
            drawingSurface.font = "bold 42px Arial";
            drawingSurface.fillText("PAUSE", canvas.width / 2, canvas.height / 2 - 30);
            drawingSurface.font = "18px Arial";
            drawingSurface.fillStyle = "white";
            drawingSurface.fillText("Clique sur ▶ ou appuie sur P pour reprendre", canvas.width / 2, canvas.height / 2 + 20);
            drawingSurface.fillStyle = "rgba(255,255,255,0.15)";
            drawingSurface.beginPath();
            drawingSurface.roundRect(pauseBtn.x, pauseBtn.y, pauseBtn.width, pauseBtn.height, 8);
            drawingSurface.fill();
            drawingSurface.font = "26px Arial";
            drawingSurface.fillStyle = "white";
            drawingSurface.fillText("▶", pauseBtn.x + pauseBtn.width / 2, pauseBtn.y + 32);
        }
    </script>
</body>

</html>
