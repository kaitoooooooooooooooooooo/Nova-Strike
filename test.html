<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="canvas-container">
        <canvas id="myCanvas" width="700" height="700"></canvas>
    </div>

    <button id="btn-trigger">lunch</button>

    <script>
        const canvas = document.getElementById('myCanvas');
        var explosionImages = [
            new Image(), new Image(), new Image(), new Image(),
            new Image(), new Image(), new Image(), new Image(),
            new Image(), new Image(), new Image(), new Image(),
            new Image(), new Image(), new Image(), new Image(),
            new Image()
        ];
        explosionImages[0].src = "./assets/explosion/frame_00_delay-0.1s.png";
        explosionImages[1].src = "./assets/explosion/frame_01_delay-0.1s.png";
        explosionImages[2].src = "./assets/explosion/frame_02_delay-0.1s.png";
        explosionImages[3].src = "./assets/explosion/frame_03_delay-0.1s.png";
        explosionImages[4].src = "./assets/explosion/frame_04_delay-0.1s.png";
        explosionImages[5].src = "./assets/explosion/frame_05_delay-0.1s.png";
        explosionImages[6].src = "./assets/explosion/frame_06_delay-0.1s.png";
        explosionImages[7].src = "./assets/explosion/frame_07_delay-0.1s.png";
        explosionImages[8].src = "./assets/explosion/frame_08_delay-0.1s.png";
        explosionImages[9].src = "./assets/explosion/frame_09_delay-0.1s.png";
        explosionImages[10].src = "./assets/explosion/frame_10_delay-0.1s.png";
        explosionImages[11].src = "./assets/explosion/frame_11_delay-0.1s.png";
        explosionImages[12].src = "./assets/explosion/frame_12_delay-0.1s.png";
        explosionImages[13].src = "./assets/explosion/frame_13_delay-0.1s.png";
        explosionImages[14].src = "./assets/explosion/frame_14_delay-0.1s.png";
        explosionImages[15].src = "./assets/explosion/frame_15_delay-0.1s.png";
        explosionImages[16].src = "./assets/explosion/frame_16_delay-0.1s.png";

        const ctx = canvas.getContext('2d');

        document.getElementById('btn-trigger').addEventListener('click', () => {
            const anim = new animateGif(explosionImages, 0, 0, 0, 0);
            const timer = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (anim.finish)
                    clearInterval(timer);
                anim.animate(ctx);
            }, 70);
        });

        class animateGif {
            constructor(imgArray, px, py, dx, dy) {
                this.imgs = imgArray;
                this.index = 0;
                this.px = px;
                this.py = py;
                this.dx = dx;
                this.dy = dy;
                this.finish = false;
            }
            animate(ctx) {
                if (this.finish)
                    return;
                ctx.drawImage(this.imgs[this.index], this.px, this.py, canvas.width, canvas.height);
                this.px += this.dx;
                this.py += this.dy;
                this.index++;
                if (this.index >= this.imgs.length)
                    this.finish = true;
            }
        }

    </script>

</body>

</html>
